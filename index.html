<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手書きアニメーション</title>
  <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  <style>
    @font-face {
      font-family: 'Yuruka';
      src: url('fonts/FOT-YurukaStd-UB.otf') format('opentype');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Yuruka', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 14px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #a8d8ea;
    }

    .bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      background: #16213e;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid #0f3460;
    }

    .tool-group { display: flex; align-items: center; gap: 8px; }

    label { font-size: 0.8rem; color: #aaa; font-family: 'Yuruka', sans-serif; }

    input[type=color] {
      width: 34px; height: 34px;
      border: none; border-radius: 6px;
      cursor: pointer; background: none; padding: 2px;
    }

    input[type=range] { width: 80px; accent-color: #a8d8ea; }

    select {
      font-family: 'Yuruka', sans-serif;
      font-size: 0.82rem;
      background: #0f3460;
      color: #eee;
      border: 1px solid #1a4a8a;
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
    }

    .size-preview {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }

    .dot {
      background: white;
      border-radius: 50%;
      transition: width 0.1s, height 0.1s;
    }

    .divider { width: 1px; height: 30px; background: #0f3460; }

    button {
      padding: 7px 16px;
      border: none; border-radius: 8px;
      font-family: 'Yuruka', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-clear    { background: #e74c3c; color: white; }
    .btn-undo     { background: #555; color: white; }
    .btn-preview  { background: #2ecc71; color: #111; }
    .btn-download { background: #a8d8ea; color: #111; }

    .format-tabs {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #0f3460;
    }

    .format-tab {
      padding: 6px 14px;
      font-family: 'Yuruka', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      border: none; cursor: pointer;
      background: #0f3460; color: #aaa;
      transition: background 0.15s, color 0.15s;
      border-radius: 0;
    }

    .format-tab.active { background: #a8d8ea; color: #111; }

    .extra-option {
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.2s;
    }
    .extra-option.hidden { opacity: 0; pointer-events: none; width: 0; overflow: hidden; }

    .canvas-wrap {
      position: relative;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      background-image:
        linear-gradient(45deg, #333 25%, transparent 25%),
        linear-gradient(-45deg, #333 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #333 75%),
        linear-gradient(-45deg, transparent 75%, #333 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #222;
      max-width: 100%;
    }

    canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
      max-width: 100%;
      max-height: 70vh;
    }

    .status {
      font-size: 0.8rem; color: #888;
      min-height: 1.2em; text-align: center;
      font-family: 'Yuruka', sans-serif;
    }

    .status.recording { color: #e74c3c; animation: blink 1s infinite; }
    .status.success { color: #2ecc71; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .val-label { font-size: 0.8rem; color: #aaa; min-width: 28px; text-align: right; }
  </style>
</head>
<body>

<h1>✏️ 手書きアニメーション</h1>

<!-- 描画ツールバー -->
<div class="bar">
  <div class="tool-group">
    <label>色</label>
    <input type="color" id="colorPicker" value="#ffffff">
  </div>

  <div class="divider"></div>

  <div class="tool-group">
    <label>不透明度</label>
    <input type="range" id="opacitySlider" min="1" max="100" value="100">
    <span class="val-label" id="opacityLabel">100%</span>
  </div>

  <div class="divider"></div>

  <div class="tool-group">
    <label>太さ</label>
    <input type="range" id="sizeSlider" min="1" max="40" value="6">
    <div class="size-preview">
      <div class="dot" id="dotPreview" style="width:6px;height:6px"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="tool-group">
    <label>速度</label>
    <input type="range" id="speedSlider" min="0.25" max="4" step="0.25" value="1">
    <span class="val-label" id="speedLabel">1×</span>
  </div>

  <div class="divider"></div>

  <div class="tool-group">
    <label>サイズ</label>
    <select id="canvasSize">
      <option value="800x450">16:9 (800×450)</option>
      <option value="800x500" selected>フリー (800×500)</option>
      <option value="600x600">1:1 (600×600)</option>
      <option value="450x800">9:16 (450×800)</option>
    </select>
  </div>

  <div class="divider"></div>

  <button class="btn-undo" id="btnUndo">↩ 戻す</button>
  <button class="btn-clear" id="btnClear">✕ 全消去</button>

  <div class="divider"></div>

  <button class="btn-preview" id="btnPreview">▶ プレビュー</button>
  <button class="btn-download" id="btnDownload" disabled>⬇ ダウンロード</button>
</div>

<!-- 出力設定バー -->
<div class="bar">
  <span style="font-size:0.8rem;color:#aaa">出力形式</span>
  <div class="format-tabs">
    <button class="format-tab active" id="tabWebm">WebM（透過）</button>
    <button class="format-tab" id="tabMp4">MP4</button>
    <button class="format-tab" id="tabGif">GIF</button>
  </div>

  <!-- 背景色（MP4/GIF） -->
  <div class="extra-option hidden" id="bgOption">
    <label>背景色</label>
    <input type="color" id="bgColor" value="#000000">
  </div>

  <!-- GIF用：透過ON/OFF -->
  <div class="extra-option hidden" id="gifTransOption">
    <label>透過</label>
    <input type="checkbox" id="gifTransparent" checked>
  </div>

  <div class="divider"></div>

  <div class="tool-group">
    <label>静止時間</label>
    <input type="range" id="tailSlider" min="0" max="5" step="0.5" value="1">
    <span class="val-label" id="tailLabel">1秒</span>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="canvas" width="800" height="500"></canvas>
</div>

<div class="status" id="status">キャンバスに文字を書いてください</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const colorPicker = document.getElementById('colorPicker');
const opacitySlider = document.getElementById('opacitySlider');
const opacityLabel = document.getElementById('opacityLabel');
const sizeSlider = document.getElementById('sizeSlider');
const speedSlider = document.getElementById('speedSlider');
const speedLabel = document.getElementById('speedLabel');
const tailSlider = document.getElementById('tailSlider');
const tailLabel = document.getElementById('tailLabel');
const dotPreview = document.getElementById('dotPreview');
const canvasSizeSelect = document.getElementById('canvasSize');
const btnUndo = document.getElementById('btnUndo');
const btnClear = document.getElementById('btnClear');
const btnPreview = document.getElementById('btnPreview');
const btnDownload = document.getElementById('btnDownload');
const statusEl = document.getElementById('status');
const tabWebm = document.getElementById('tabWebm');
const tabMp4 = document.getElementById('tabMp4');
const tabGif = document.getElementById('tabGif');
const bgOption = document.getElementById('bgOption');
const bgColor = document.getElementById('bgColor');
const gifTransOption = document.getElementById('gifTransOption');
const gifTransparent = document.getElementById('gifTransparent');

let strokes = [];
let currentStroke = null;
let isDrawing = false;
let startTime = null;
let format = 'webm';

// --- Format tabs ---

function setFormat(f) {
  format = f;
  [tabWebm, tabMp4, tabGif].forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
  bgOption.classList.toggle('hidden', f === 'webm');
  gifTransOption.classList.toggle('hidden', f !== 'gif');
}

tabWebm.addEventListener('click', () => setFormat('webm'));
tabMp4.addEventListener('click', () => setFormat('mp4'));
tabGif.addEventListener('click', () => setFormat('gif'));

// --- Canvas size ---

canvasSizeSelect.addEventListener('change', () => {
  if (strokes.length > 0 && !confirm('キャンバスサイズを変更すると描いた内容が消えます。続けますか？')) {
    canvasSizeSelect.value = canvas.width + 'x' + canvas.height;
    return;
  }
  const [w, h] = canvasSizeSelect.value.split('x').map(Number);
  canvas.width = w;
  canvas.height = h;
  strokes = [];
  startTime = null;
  btnDownload.disabled = true;
  updateStatus('キャンバスに文字を書いてください');
});

// --- Sliders ---

opacitySlider.addEventListener('input', () => {
  opacityLabel.textContent = opacitySlider.value + '%';
});

sizeSlider.addEventListener('input', () => {
  const v = sizeSlider.value;
  dotPreview.style.width = v + 'px';
  dotPreview.style.height = v + 'px';
});

speedSlider.addEventListener('input', () => {
  speedLabel.textContent = speedSlider.value + '×';
});

tailSlider.addEventListener('input', () => {
  tailLabel.textContent = tailSlider.value + '秒';
});

// --- Drawing ---

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY,
  };
}

function onPointerDown(e) {
  e.preventDefault();
  isDrawing = true;
  if (!startTime) startTime = performance.now();
  const { x, y } = getPos(e);
  const t = performance.now() - startTime;
  const opacity = parseInt(opacitySlider.value) / 100;
  currentStroke = {
    color: colorPicker.value,
    size: parseInt(sizeSlider.value),
    opacity,
    points: [{ x, y, t }],
  };
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.beginPath();
  ctx.arc(x, y, currentStroke.size / 2, 0, Math.PI * 2);
  ctx.fillStyle = currentStroke.color;
  ctx.fill();
  ctx.restore();
}

function onPointerMove(e) {
  if (!isDrawing || !currentStroke) return;
  e.preventDefault();
  const { x, y } = getPos(e);
  const t = performance.now() - startTime;
  const prev = currentStroke.points[currentStroke.points.length - 1];
  currentStroke.points.push({ x, y, t });

  ctx.save();
  ctx.globalAlpha = currentStroke.opacity;
  ctx.beginPath();
  ctx.moveTo(prev.x, prev.y);
  ctx.lineTo(x, y);
  ctx.strokeStyle = currentStroke.color;
  ctx.lineWidth = currentStroke.size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
  ctx.restore();
}

function onPointerUp(e) {
  if (!isDrawing) return;
  isDrawing = false;
  if (currentStroke && currentStroke.points.length > 0) {
    strokes.push(currentStroke);
    btnDownload.disabled = false;
    updateStatus(`ストローク ${strokes.length} 本`);
  }
  currentStroke = null;
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp);

// --- Undo / Clear ---

btnUndo.addEventListener('click', () => {
  if (strokes.length === 0) return;
  strokes.pop();
  redrawAll();
  if (strokes.length === 0) {
    btnDownload.disabled = true;
    startTime = null;
    updateStatus('キャンバスに文字を書いてください');
  } else {
    updateStatus(`ストローク ${strokes.length} 本`);
  }
});

btnClear.addEventListener('click', () => {
  strokes = [];
  currentStroke = null;
  startTime = null;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  btnDownload.disabled = true;
  updateStatus('キャンバスに文字を書いてください');
});

// --- Redraw ---

function redrawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const stroke of strokes) drawStrokeAll(ctx, stroke);
}

function drawStrokeAll(c, stroke) {
  const pts = stroke.points;
  if (pts.length === 0) return;
  c.save();
  c.globalAlpha = stroke.opacity ?? 1;
  c.beginPath();
  c.arc(pts[0].x, pts[0].y, stroke.size / 2, 0, Math.PI * 2);
  c.fillStyle = stroke.color;
  c.fill();
  if (pts.length > 1) {
    c.beginPath();
    c.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
    c.strokeStyle = stroke.color;
    c.lineWidth = stroke.size;
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.stroke();
  }
  c.restore();
}

// --- Shared render ---

function buildEvents() {
  const events = [];
  for (let si = 0; si < strokes.length; si++)
    for (let pi = 0; pi < strokes[si].points.length; pi++)
      events.push({ si, pi, t: strokes[si].points[pi].t });
  events.sort((a, b) => a.t - b.t);
  return events;
}

function renderFrame(c, currentT, bg) {
  const w = c.canvas ? c.canvas.width : c.width;
  const h = c.canvas ? c.canvas.height : c.height;
  c.clearRect(0, 0, w, h);
  if (bg) { c.fillStyle = bg; c.fillRect(0, 0, w, h); }
  for (const stroke of strokes) {
    const pts = stroke.points;
    let count = 0;
    for (let pi = 0; pi < pts.length; pi++) {
      if (pts[pi].t <= currentT) count = pi + 1;
      else break;
    }
    if (count === 0) continue;
    c.save();
    c.globalAlpha = stroke.opacity ?? 1;
    c.beginPath();
    c.arc(pts[0].x, pts[0].y, stroke.size / 2, 0, Math.PI * 2);
    c.fillStyle = stroke.color;
    c.fill();
    if (count > 1) {
      c.beginPath();
      c.moveTo(pts[0].x, pts[0].y);
      for (let pi = 1; pi < count; pi++) c.lineTo(pts[pi].x, pts[pi].y);
      c.strokeStyle = stroke.color;
      c.lineWidth = stroke.size;
      c.lineCap = 'round';
      c.lineJoin = 'round';
      c.stroke();
    }
    c.restore();
  }
}

// --- Preview ---

btnPreview.addEventListener('click', () => {
  if (strokes.length === 0) return;
  const speed = parseFloat(speedSlider.value);
  const events = buildEvents();
  if (!events.length) return;
  const totalDuration = events[events.length - 1].t;
  const tailMs = parseFloat(tailSlider.value) * 1000;
  const startTs = performance.now();

  setUIEnabled(false);
  updateStatus('▶ プレビュー再生中...');

  function frame() {
    const elapsed = performance.now() - startTs;
    renderFrame(ctx, elapsed * speed, null);
    if (elapsed * speed < totalDuration + tailMs * speed) {
      requestAnimationFrame(frame);
    } else {
      redrawAll();
      setUIEnabled(true);
      updateStatus('プレビュー完了 ✓', 'success');
    }
  }
  requestAnimationFrame(frame);
});

// --- Download dispatcher ---

btnDownload.addEventListener('click', async () => {
  if (strokes.length === 0) return;
  if (format === 'mp4') await exportMp4();
  else if (format === 'gif') await exportGif();
  else await exportWebm();
});

function getTailMs() { return parseFloat(tailSlider.value) * 1000; }

// --- WebM ---

async function exportWebm() {
  const speed = parseFloat(speedSlider.value);
  const events = buildEvents();
  const drawDuration = events[events.length - 1].t / speed;
  const tailMs = getTailMs();
  const totalDuration = drawDuration + tailMs;

  setUIEnabled(false);
  updateStatus('● WebM を生成中...', 'recording');

  const off = document.createElement('canvas');
  off.width = canvas.width; off.height = canvas.height;
  const oc = off.getContext('2d');

  const stream = off.captureStream(60);
  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9' : 'video/webm';
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  recorder.onstop = () => {
    triggerDownload(new Blob(chunks, { type: mimeType }), `handwriting_${Date.now()}.webm`);
    setUIEnabled(true); redrawAll();
    updateStatus('ダウンロード完了 ✓', 'success');
  };

  recorder.start();
  const startTs = performance.now();

  function frame() {
    const elapsed = performance.now() - startTs;
    renderFrame(oc, elapsed * speed, null);
    if (elapsed < totalDuration + 300) {
      requestAnimationFrame(frame);
    } else {
      renderFrame(oc, Infinity, null);
      setTimeout(() => recorder.stop(), 200);
    }
  }
  requestAnimationFrame(frame);
}

// --- MP4 ---

async function exportMp4() {
  if (typeof Mp4Muxer === 'undefined') { updateStatus('mp4-muxer の読み込みに失敗しました'); return; }
  if (!window.VideoEncoder) { updateStatus('Chrome が必要です（VideoEncoder 非対応）'); setUIEnabled(true); return; }

  const speed = parseFloat(speedSlider.value);
  const events = buildEvents();
  const drawDurationMs = events[events.length - 1].t / speed;
  const tailMs = getTailMs();
  const totalMs = drawDurationMs + tailMs;
  const fps = 60;
  const totalFrames = Math.ceil((totalMs / 1000) * fps);
  const bg = bgColor.value;
  const w = canvas.width, h = canvas.height;

  setUIEnabled(false);
  updateStatus('● MP4 を生成中...', 'recording');

  const target = new Mp4Muxer.ArrayBufferTarget();
  const muxer = new Mp4Muxer.Muxer({ target, video: { codec: 'avc', width: w, height: h }, fastStart: 'in-memory' });

  const encoder = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error: e => console.error(e),
  });
  encoder.configure({ codec: 'avc1.42001f', width: w, height: h, bitrate: 8_000_000, framerate: fps });

  const off = new OffscreenCanvas(w, h);
  const oc = off.getContext('2d');

  for (let fi = 0; fi < totalFrames; fi++) {
    const elapsedMs = (fi / fps) * 1000;
    renderFrame(oc, elapsedMs * speed, bg);
    const vf = new VideoFrame(off, { timestamp: (fi / fps) * 1_000_000 });
    encoder.encode(vf, { keyFrame: fi % (fps * 2) === 0 });
    vf.close();
    if (fi % 10 === 0) await new Promise(r => setTimeout(r, 0));
  }

  await encoder.flush();
  muxer.finalize();
  triggerDownload(new Blob([target.buffer], { type: 'video/mp4' }), `handwriting_${Date.now()}.mp4`);
  setUIEnabled(true); redrawAll();
  updateStatus('ダウンロード完了 ✓', 'success');
}

// --- GIF ---

async function exportGif() {
  if (typeof GIF === 'undefined') { updateStatus('gif.js の読み込みに失敗しました'); return; }

  const speed = parseFloat(speedSlider.value);
  const events = buildEvents();
  const drawDurationMs = events[events.length - 1].t / speed;
  const tailMs = getTailMs();
  const totalMs = drawDurationMs + tailMs;
  const fps = 20; // GIF は 20fps で十分
  const totalFrames = Math.ceil((totalMs / 1000) * fps);
  const useTransparent = gifTransparent.checked;
  const bg = useTransparent ? null : bgColor.value;
  const w = canvas.width, h = canvas.height;

  setUIEnabled(false);
  updateStatus('● GIF を生成中（時間がかかります）...', 'recording');

  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const oc = off.getContext('2d');

  const gif = new GIF({
    workers: 2,
    quality: 10,
    width: w,
    height: h,
    workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js',
    transparent: useTransparent ? 0x00000000 : null,
  });

  for (let fi = 0; fi < totalFrames; fi++) {
    const elapsedMs = (fi / fps) * 1000;
    if (bg) {
      oc.fillStyle = bg;
      oc.fillRect(0, 0, w, h);
    } else {
      oc.clearRect(0, 0, w, h);
    }
    renderFrame(oc, elapsedMs * speed, bg);
    gif.addFrame(oc, { copy: true, delay: 1000 / fps });
    if (fi % 5 === 0) await new Promise(r => setTimeout(r, 0));
  }

  gif.on('finished', blob => {
    triggerDownload(blob, `handwriting_${Date.now()}.gif`);
    setUIEnabled(true); redrawAll();
    updateStatus('ダウンロード完了 ✓', 'success');
  });

  gif.render();
}

// --- Helpers ---

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function setUIEnabled(enabled) {
  [btnClear, btnUndo, btnPreview, btnDownload, tabWebm, tabMp4, tabGif, canvasSizeSelect].forEach(el => {
    el.disabled = !enabled;
  });
  canvas.style.pointerEvents = enabled ? 'auto' : 'none';
}

function updateStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + type;
}
</script>
</body>
</html>
